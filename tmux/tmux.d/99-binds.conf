# Unbind tmux prefix
set -g prefix None
unbind C-b

bind -T tmuxing_mode Any run-shell 'tmux send-keys -l "#{client_last_key}"' \; switch-client -T tmuxing_mode

# Ctrl-b enters tmuxing mode
bind -n C-b switch-client -T tmuxing_mode

# i exits back to terminal
bind -T tmuxing_mode i switch-client -T root

# pane nav (stays in mode)
bind -T tmuxing_mode h select-pane -L \; switch-client -T tmuxing_mode
bind -T tmuxing_mode j select-pane -D \; switch-client -T tmuxing_mode
bind -T tmuxing_mode k select-pane -U \; switch-client -T tmuxing_mode
bind -T tmuxing_mode l select-pane -R \; switch-client -T tmuxing_mode

bind -T tmuxing_mode Left  select-pane -L \; switch-client -T tmuxing_mode
bind -T tmuxing_mode Down  select-pane -D \; switch-client -T tmuxing_mode
bind -T tmuxing_mode Up    select-pane -U \; switch-client -T tmuxing_mode
bind -T tmuxing_mode Right select-pane -R \; switch-client -T tmuxing_mode

# resize (stays in mode)
bind -T tmuxing_mode H resize-pane -L 5 \; switch-client -T tmuxing_mode
bind -T tmuxing_mode J resize-pane -D 5 \; switch-client -T tmuxing_mode
bind -T tmuxing_mode K resize-pane -U 5 \; switch-client -T tmuxing_mode
bind -T tmuxing_mode L resize-pane -R 5 \; switch-client -T tmuxing_mode

# windows
bind -T tmuxing_mode n next-window \; switch-client -T tmuxing_mode
bind -T tmuxing_mode N previous-window \; switch-client -T tmuxing_mode
bind -T tmuxing_mode c new-window \; switch-client -T tmuxing_mode

# splits
bind -T tmuxing_mode v split-window -h \; switch-client -T tmuxing_mode
bind -T tmuxing_mode s split-window -v \; switch-client -T tmuxing_mode

# kill
bind -T tmuxing_mode x kill-pane \; switch-client -T tmuxing_mode
